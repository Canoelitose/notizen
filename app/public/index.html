<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Notizen</title>

<!-- PWA: server-only mod, lets the app install to the home screen / app drawer. -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#B8451F" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0E0D0B" media="(prefers-color-scheme: dark)" />
<meta name="description" content="Self-hosted Notiz-App — IT, Allgemein, HERMES, Diagramme." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Notizen" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-2: #F4F2EE;
    --surface-hover: #EEEBE5;
    --border: #E6E2DA;
    --border-strong: #D6D1C7;
    --text: #1A1815;
    --text-muted: #6C6862;
    --text-subtle: #94908A;
    --accent: #B8451F;
    --accent-soft: #FBEDE4;
    --accent-text: #8A2F12;
    --success: #15803D;
    --success-soft: #E3F4E8;
    --danger: #DC2626;
    --danger-soft: #FEE2E2;
    --warning: #A16207;
    --warning-soft: #FAF1D4;
    --info: #1E5FBF;
    --info-soft: #E2ECFB;
    --code-bg: #F4F2EE;
    --shadow-sm: 0 1px 2px rgba(20, 18, 14, 0.04);
    --shadow-md: 0 4px 16px rgba(20, 18, 14, 0.06), 0 1px 2px rgba(20, 18, 14, 0.04);
    --shadow-lg: 0 20px 50px rgba(20, 18, 14, 0.12);
    --radius-sm: 6px;
    --radius: 8px;
    --radius-lg: 12px;
    --font-ui: "DM Sans", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    color-scheme: light;
  }
  :root[data-theme="dark"] {
    --bg: #0E0D0B;
    --surface: #1A1815;
    --surface-2: #211E1A;
    --surface-hover: #272320;
    --border: #2A2622;
    --border-strong: #3A3530;
    --text: #EDE7DC;
    --text-muted: #9C968B;
    --text-subtle: #6A655D;
    --accent: #F08A4B;
    --accent-soft: #3D2010;
    --accent-text: #F5B084;
    --success: #4ADE80;
    --success-soft: #122A1B;
    --danger: #F87171;
    --danger-soft: #3A0F0F;
    --warning: #FBBF24;
    --warning-soft: #2A1F0A;
    --info: #7DB3FB;
    --info-soft: #11243E;
    --code-bg: #1F1C18;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
    --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.55), 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 28px 70px rgba(0, 0, 0, 0.7);
    color-scheme: dark;
  }
  /* Smooth theme transitions — only on color properties, not layout */
  :root.theme-transitioning,
  :root.theme-transitioning * {
    transition: background-color 220ms ease, border-color 220ms ease, color 180ms ease, box-shadow 220ms ease, fill 180ms ease, stroke 180ms ease !important;
  }
  /* Always-on transition for key surfaces, so toggle feels smooth even without the class */
  body, .sidebar, .list-pane, .editor-pane, .surface,
  .note-item, .btn, .chip, .field-input, .field-textarea, .search,
  .tag, .code-block, .modal, .dropdown-menu, .seg, .seg button,
  .folder-row, .image-block, .table-block, .table-block th, .table-block td {
    transition: background-color 200ms ease, border-color 200ms ease, color 160ms ease;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; color: inherit; }
  textarea { resize: none; }
  ::selection { background: var(--accent-soft); color: var(--accent-text); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* App grid */
  .app {
    --sidebar-w: 240px;
    --list-w: 320px;
    display: grid; height: 100vh;
    grid-template-columns: var(--sidebar-w) var(--list-w) 1fr;
  }
  .app > .sidebar    { grid-column: 1; }
  .app > .list-pane  { grid-column: 2; }
  .app > .editor-pane { grid-column: 3; }
  .app > .dashboard  { grid-column: 2 / 4; }
  .app.sidebar-collapsed { --sidebar-w: 0; }
  .app.sidebar-collapsed > .sidebar { display: none; }
  .app.list-collapsed { --list-w: 0; }
  .app.list-collapsed > .list-pane { display: none; }
  /* When both list and dashboard apply, dashboard still needs to flex to fill */
  .sidebar-collapse-btn,
  .list-collapse-btn {
    width: 24px; height: 24px;
    color: var(--text-subtle);
    flex-shrink: 0;
  }
  .sidebar-collapse-btn:hover,
  .list-collapse-btn:hover { color: var(--text); background: var(--surface-hover); }
  @media (max-width: 980px) {
    /* Obsidian-style mobile shell: editor/list full-screen, sidebar as drawer */
    body { overflow: hidden; }
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      height: calc(100vh - var(--mtab-h, 54px) - env(safe-area-inset-bottom, 0px));
      position: relative;
    }
    .app > .sidebar, .app > .list-pane, .app > .editor-pane { display: none; }
    .app[data-pane="list"] > .list-pane,
    .app[data-pane="editor"] > .editor-pane { display: flex; }
    /* Sidebar slides in as a drawer over current pane */
    .app[data-pane="sidebar"] > .list-pane,
    .app[data-pane="sidebar"] > .editor-pane { display: flex; }
    .app[data-pane="sidebar"] > .sidebar {
      display: flex;
      position: fixed;
      top: 0; bottom: var(--mtab-h, 54px); left: 0;
      width: min(86vw, 320px);
      z-index: 110;
      border-right: 1px solid var(--border);
      box-shadow: 16px 0 48px rgba(0, 0, 0, 0.32);
      animation: drawer-in 240ms cubic-bezier(.2,.8,.2,1);
    }
    .mobile-drawer-backdrop {
      position: fixed;
      inset: 0 0 var(--mtab-h, 54px) 0;
      background: rgba(20, 18, 14, 0.5);
      z-index: 105;
      border: none; padding: 0; cursor: pointer;
      animation: fade-in 180ms ease;
    }
    :root[data-theme="dark"] .mobile-drawer-backdrop { background: rgba(0, 0, 0, 0.6); }
    @keyframes drawer-in {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    /* Sidebar collapse buttons hidden on mobile (we use the tab bar instead) */
    .sidebar-collapse-btn, .list-collapse-btn { display: none !important; }
    /* Top bars sticky for Obsidian-like feel */
    .editor-toolbar, .list-header {
      position: sticky; top: 0; z-index: 4;
      background: var(--surface);
      backdrop-filter: saturate(180%) blur(8px);
    }
    .list-header { background: var(--bg); }
  }

  /* Bottom mobile tab bar — visible only on mobile */
  .mobile-tabbar { display: none; }
  @media (max-width: 980px) {
    .mobile-tabbar {
      --mtab-h: 54px;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(54px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 130;
    }
    .mobile-tabbar button {
      flex: 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--text-subtle);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      padding: 7px 4px 6px;
      position: relative;
      transition: color 140ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-tabbar button svg { width: 22px; height: 22px; }
    .mobile-tabbar button.active { color: var(--accent); }
    .mobile-tabbar button.active::before {
      content: "";
      position: absolute;
      top: 0; left: 50%;
      width: 28px; height: 2px; border-radius: 0 0 2px 2px;
      background: var(--accent);
      transform: translateX(-50%);
    }
    .mobile-tabbar button:active { background: var(--surface-hover); }
    .mobile-tabbar button.fab-btn {
      color: var(--accent);
    }
    .mobile-tabbar button.fab-btn .tab-fab {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 14px color-mix(in oklab, var(--accent) 45%, transparent);
      margin-bottom: -2px;
    }
    .mobile-tabbar button.fab-btn .tab-fab svg { width: 20px; height: 20px; }
  }

  /* Layout columns */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .list-pane { background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .editor-pane { background: var(--surface); display: flex; flex-direction: column; min-height: 0; }

  /* Sidebar */
  .brand { padding: 18px 16px 14px; display: flex; align-items: center; gap: 10px; }
  .brand > div:nth-child(2) { flex: 1; min-width: 0; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), color-mix(in oklab, var(--accent) 60%, #000));
    display: grid; place-items: center; color: white; font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 15px; }
  .brand-sub { color: var(--text-subtle); font-size: 11px; margin-top: -2px; letter-spacing: 0.04em; text-transform: uppercase; }

  .section-label {
    padding: 14px 16px 6px; font-size: 11px; font-weight: 600;
    color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label button.icon-btn { color: var(--text-subtle); }

  .folder-list { padding: 0 8px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
  .folder-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px; border-radius: var(--radius-sm);
    color: var(--text); cursor: pointer; border: none; background: transparent;
    width: 100%; text-align: left; font-size: 13px;
    min-height: 26px;
  }
  .section-label {
    padding: 10px 16px 4px; font-size: 10.5px; font-weight: 600;
    color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-util-btn {
    width: 32px; height: 32px; padding: 0 !important;
    flex: 0 0 auto !important; justify-content: center !important;
    border-radius: 6px !important; position: relative;
  }
  .sidebar-util-btn.active { background: var(--accent-soft); color: var(--accent-text); }
  .sidebar-util-badge {
    position: absolute; top: 0; right: 0;
    background: var(--accent); color: white;
    font-size: 9px; font-weight: 700;
    min-width: 14px; height: 14px; border-radius: 999px;
    padding: 0 4px;
    display: inline-flex; align-items: center; justify-content: center;
    transform: translate(30%, -30%);
  }
  .folder-row:hover { background: var(--surface-hover); }
  .folder-row.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 500; }
  .folder-row .count { margin-left: auto; color: var(--text-subtle); font-size: 11px; font-variant-numeric: tabular-nums; }
  .folder-row.active .count { color: var(--accent-text); opacity: 0.7; }
  .folder-row .ico { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto; padding: 12px 12px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 6px; align-items: center;
  }
  .sidebar-footer .btn { flex: 1; }

  /* List pane */
  .list-header { padding: 14px 16px 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--border); }
  .list-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .list-title { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
  .list-title .muted { color: var(--text-subtle); font-weight: 400; font-size: 13px; margin-left: 6px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-subtle); pointer-events: none; }
  .search {
    width: 100%; padding: 8px 10px 8px 32px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface); color: var(--text);
    font-size: 13px; outline: none; transition: border-color 120ms, box-shadow 120ms;
  }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
    cursor: pointer; transition: all 120ms;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .chip-smart { gap: 4px; }
  .chip-smart.active { background: var(--accent); color: white; border-color: var(--accent); }
  .chip-count {
    font-size: 10px; padding: 0 5px; border-radius: 999px;
    background: color-mix(in oklab, currentColor 15%, transparent);
    font-variant-numeric: tabular-nums;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .notes-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 2px; }
  .note-item {
    padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
    border: 1px solid transparent; background: transparent;
    display: flex; flex-direction: column; gap: 4px;
    text-align: left; width: 100%; color: var(--text);
  }
  .note-item:hover { background: var(--surface); }
  .note-item.active { background: var(--surface); border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
  .note-item-row { display: flex; align-items: center; gap: 8px; }
  .note-type-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .note-type-badge.it { background: var(--info-soft); color: var(--info); }
  .note-type-badge.normal { background: var(--surface-2); color: var(--text-muted); }
  .note-title { font-weight: 500; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.005em; }
  .note-pin { color: var(--accent); flex-shrink: 0; }
  .note-item-delete {
    flex-shrink: 0;
    width: 24px; height: 24px;
    margin: -4px -6px -4px 0;
    border: none; background: transparent;
    color: var(--text-subtle); cursor: pointer; padding: 0;
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 120ms, background 120ms, color 120ms;
  }
  .note-item:hover .note-item-delete,
  .note-item:focus-within .note-item-delete,
  .note-item.active .note-item-delete { opacity: 1; }
  .note-item-delete:hover { background: var(--danger-soft); color: var(--danger); }
  @media (hover: none) {
    .note-item-delete { opacity: 0.5; }
  }
  .note-preview { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-clamp: 2; }
  .note-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-subtle); margin-top: 2px; }
  .note-meta .dot-sep { width: 2px; height: 2px; background: currentColor; border-radius: 50%; }
  .note-status { display: inline-flex; align-items: center; gap: 4px; }
  .note-status.danger { color: var(--danger); font-weight: 500; }
  .note-status.warning { color: var(--warning); }
  .note-status.success { color: var(--success); }
  .note-status .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.success { background: var(--success); }
  .status-dot.danger { background: var(--danger); }
  .status-dot.warning { background: var(--warning); }
  .status-dot.neutral { background: var(--text-subtle); }

  .list-empty { padding: 40px 20px; text-align: center; color: var(--text-subtle); font-size: 13px; }
  .list-empty svg { width: 36px; height: 36px; margin-bottom: 10px; opacity: 0.5; }

  /* Subfolders shown inside the list pane (parent folder selected) */
  .sublist-up {
    display: inline-flex; align-items: center; gap: 4px;
    align-self: flex-start;
    padding: 4px 8px 4px 4px;
    margin-bottom: -4px;
    border: none; background: transparent;
    color: var(--text-muted);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    border-radius: 5px;
    max-width: 100%;
    transition: background 120ms, color 120ms;
  }
  .sublist-up:hover { background: var(--surface-hover); color: var(--text); }
  .sublist-up span {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .sublist-folders { padding: 6px 6px 4px; display: flex; flex-direction: column; gap: 4px; }
  .sublist-folders-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-subtle);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 2px 8px 4px;
  }
  .sublist-folders-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sublist-folder {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-align: left;
    transition: background 120ms, border-color 120ms;
  }
  .sublist-folder:hover {
    background: var(--surface);
    border-color: var(--border-strong);
  }
  .sublist-folder-ico { color: var(--text-muted); flex-shrink: 0; }
  .sublist-folder-name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sublist-folder-count {
    color: var(--text-subtle);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    font-weight: 400;
  }
  /* Clean variant — borderless, subtle hover */
  [data-style="clean"] .sublist-folder { border-color: transparent; }
  [data-style="clean"] .sublist-folder:hover {
    background: var(--surface-2);
    border-color: transparent;
  }

  /* Diagram context-menu swatches need visible borders even in clean mode
     (the global clean override on --border makes them nearly transparent). */
  [data-style="clean"] .diagram-shape-swatch,
  [data-style="clean"] .diagram-color-swatch {
    border-color: color-mix(in oklab, var(--text) 16%, transparent);
  }
  [data-style="clean"] .diagram-shape-swatch.active,
  [data-style="clean"] .diagram-color-swatch.active {
    border-color: var(--accent);
  }

  /* Context menu specifically — make sure the row containers and swatches
     stand out against the menu background regardless of theme/style.
     These need !important + later-in-file specificity because the global
     .diagram-color-swatch.color-* rules are defined further down. */
  .diagram-ctx-menu .diagram-shape-swatch,
  .diagram-ctx-menu .diagram-color-swatch {
    background: var(--surface-hover) !important;
    border: 1px solid var(--border-strong) !important;
  }
  .diagram-ctx-menu .diagram-shape-swatch:hover,
  .diagram-ctx-menu .diagram-color-swatch:hover {
    background: var(--surface) !important;
  }
  .diagram-ctx-menu .diagram-shape-swatch.active,
  .diagram-ctx-menu .diagram-color-swatch.active {
    border-color: var(--accent) !important;
    background: var(--accent-soft) !important;
  }
  /* Color-variant swatches: use the SOLID accent color (not the soft variant)
     so the swatch reads as a solid colored chip rather than a dim tinted square. */
  .diagram-ctx-menu .diagram-color-swatch.color-default { background: var(--surface-hover) !important; border-color: var(--border-strong) !important; }
  .diagram-ctx-menu .diagram-color-swatch.color-accent  { background: var(--accent) !important;  border-color: var(--accent) !important; }
  .diagram-ctx-menu .diagram-color-swatch.color-info    { background: var(--info) !important;    border-color: var(--info) !important; }
  .diagram-ctx-menu .diagram-color-swatch.color-success { background: var(--success) !important; border-color: var(--success) !important; }
  .diagram-ctx-menu .diagram-color-swatch.color-warning { background: var(--warning) !important; border-color: var(--warning) !important; }
  .diagram-ctx-menu .diagram-color-swatch.color-danger  { background: var(--danger) !important;  border-color: var(--danger) !important; }
  .diagram-ctx-menu .diagram-color-swatch.active {
    box-shadow: 0 0 0 2px var(--accent);
  }
  .diagram-ctx-menu .diagram-shape-mini {
    background: var(--text) !important;
  }
  .diagram-ctx-menu .diagram-shape-swatch.active .diagram-shape-mini {
    background: var(--accent) !important;
  }

  /* Editor */
  .editor-toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; min-height: 56px;
  }
  .editor-toolbar .spacer { flex: 1; }
  .editor-body { flex: 1; overflow-y: auto; }
  .editor-inner { max-width: 820px; margin: 0 auto; padding: 32px 48px 120px; }
  @media (max-width: 700px) { .editor-inner { padding: 20px 18px 100px; } }

  .editor-title {
    width: 100%; border: none; background: transparent; outline: none;
    font-size: 32px; font-weight: 700; letter-spacing: -0.025em; color: var(--text);
    padding: 0; margin: 0 0 8px;
    font-family: var(--font-ui);
  }
  .editor-title::placeholder { color: var(--text-subtle); }
  .editor-meta-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; color: var(--text-muted); font-size: 12px; margin-bottom: 24px; }
  .editor-meta-row .sep { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: 0.5; }

  /* DateTime editor */
  .datetime-editor { position: relative; display: inline-flex; }
  .datetime-trigger {
    background: transparent; border: 1px solid transparent; color: inherit;
    font: inherit; cursor: pointer;
    padding: 3px 8px; border-radius: 6px;
    display: inline-flex; align-items: center;
    transition: background 120ms, border-color 120ms;
  }
  .datetime-trigger:hover { background: var(--surface-hover); border-color: var(--border); }

  /* Compact popover (matches the screenshot: ERSTELLT AM / date+time field / Jetzt / Fertig) */
  .dt-popover {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-md);
    padding: 14px; z-index: 100; min-width: 280px;
    display: flex; flex-direction: column; gap: 10px;
    color: var(--text);
  }
  .dt-popover.right { left: auto; right: 0; }
  .dt-popover-label {
    font-size: 10px; font-weight: 600; color: var(--text-subtle);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .dt-field {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 6px;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .dt-field:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .dt-seg-group { display: inline-flex; align-items: center; gap: 0; }
  .dt-seg {
    background: transparent; border: none; color: var(--text);
    font: inherit; font-size: 14px;
    padding: 5px 2px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
    text-align: center;
    caret-color: var(--accent);
  }
  .dt-seg:focus { outline: none; background: var(--accent-soft); color: var(--accent); }
  .dt-seg::selection { background: var(--accent); color: #fff; }
  .dt-seg-sep { color: var(--text-muted); font-size: 14px; padding: 0 1px; user-select: none; }
  .dt-cal-btn {
    background: transparent; border: none; color: var(--text-muted);
    cursor: pointer; padding: 0 8px; height: 28px; border-radius: 6px;
    margin-left: auto;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms;
  }
  .dt-cal-btn:hover { background: var(--surface-hover); color: var(--text); }
  .dt-cal-btn.active { background: var(--accent-soft); color: var(--accent); }
  .dt-popover-actions { display: flex; gap: 6px; justify-content: flex-end; }

  /* Custom calendar — embedded inside the popover */
  .dtp-cal { display: flex; flex-direction: column; margin-top: 2px; }
  .dtp-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .dtp-month-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .dtp-nav { display: flex; gap: 2px; }
  .dtp-nav-btn {
    background: transparent; border: none; color: var(--text-muted);
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms, color 120ms;
  }
  .dtp-nav-btn:hover { background: var(--surface-hover); color: var(--text); }
  .dtp-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .dtp-weekday {
    text-align: center; font-size: 10px; font-weight: 600;
    color: var(--text-subtle);
    padding: 4px 0;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .dtp-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .dtp-cell {
    background: transparent; border: 1px solid transparent;
    color: var(--text);
    font: inherit; font-size: 12px;
    cursor: pointer;
    aspect-ratio: 1;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 100ms, color 100ms, border-color 100ms;
  }
  .dtp-cell:hover { background: var(--surface-hover); }
  .dtp-cell.outside { color: var(--text-subtle); opacity: 0.45; }
  .dtp-cell.today { border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .dtp-cell.selected {
    background: var(--accent); color: #fff;
    border-color: var(--accent); font-weight: 600;
  }
  .dtp-cell.selected:hover { background: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    cursor: pointer; transition: all 120ms; text-decoration: none;
  }
  .btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .btn:active { transform: translateY(0.5px); }
  .btn.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  .btn.primary:hover { background: color-mix(in oklab, var(--text) 90%, var(--accent)); }
  .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.accent:hover { background: color-mix(in oklab, var(--accent) 88%, #000); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .btn.ghost:hover { background: var(--surface-hover); color: var(--text); }
  .btn.danger:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger-soft); }
  .btn.sm { padding: 4px 8px; font-size: 12px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; justify-content: center;
    border: none; background: transparent; color: var(--text-muted); cursor: pointer;
    transition: all 120ms;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
  .icon-btn.active { background: var(--accent-soft); color: var(--accent-text); }

  /* Dropdown — shared style with .lang-select-menu */
  .dropdown { position: relative; }
  .dropdown-menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 200px; z-index: 60;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow-md); padding: 4px;
    display: flex; flex-direction: column;
  }
  .dropdown-menu.left { right: auto; left: 0; }
  .dropdown-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 5px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text); font-size: 13px; font-family: var(--font-ui);
    text-align: left; width: 100%;
  }
  .dropdown-item:hover { background: var(--surface-hover); }
  .dropdown-item.active { color: var(--accent-text); background: var(--accent-soft); }
  .dropdown-item.danger { color: var(--danger); }
  .dropdown-item.danger:hover { background: var(--danger-soft); }
  .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .dropdown-item .kbd { margin-left: auto; font-size: 11px; color: var(--text-subtle); font-family: var(--font-mono); }

  /* IT fields */
  .field { margin-bottom: 18px; }
  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; color: var(--text-subtle);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .field-input, .field-textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface); color: var(--text);
    font-size: 14px; outline: none; transition: border-color 120ms, box-shadow 120ms;
    font-family: var(--font-ui);
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

  /* Code blocks */
  .code-block {
    position: relative; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--code-bg);
  }
  .code-block > textarea:first-of-type,
  .code-block > pre:first-of-type {
    border-top-left-radius: 0; border-top-right-radius: 0;
  }
  .code-block > *:last-child {
    border-bottom-left-radius: calc(var(--radius) - 1px);
    border-bottom-right-radius: calc(var(--radius) - 1px);
  }
  .code-block .code-block-header {
    border-top-left-radius: calc(var(--radius) - 1px);
    border-top-right-radius: calc(var(--radius) - 1px);
  }
  .code-block-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: color-mix(in oklab, var(--code-bg) 80%, var(--border));
    border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
  }
  .code-block-header .lang-select {
    border: none; background: transparent; color: var(--text-muted); font-size: 11px;
    padding: 2px 4px; border-radius: 4px; cursor: pointer;
    font-family: var(--font-mono);
  }
  .code-block-header .lang-select:hover { background: var(--surface); color: var(--text); }
  .code-block-header .copy-btn,
  .code-block-divider .copy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: none; color: var(--text-subtle); font-size: 11px;
    padding: 4px 6px; border-radius: 5px; cursor: pointer; font-family: var(--font-ui);
    font-weight: 500; transition: all 140ms;
  }
  .code-block-header .copy-btn { margin-left: auto; }
  .code-block-header .copy-btn:hover,
  .code-block-divider .copy-btn:hover { background: var(--surface-hover); color: var(--text); }
  .code-block-header .copy-btn.copied,
  .code-block-divider .copy-btn.copied { color: var(--success); }
  .code-block-header .copy-btn .label,
  .code-block-divider .copy-btn .label {
    overflow: hidden; max-width: 0; opacity: 0;
    transition: max-width 220ms ease, opacity 160ms ease, margin-left 220ms ease;
    margin-left: 0; white-space: nowrap; display: inline-block;
  }
  .code-block-header .copy-btn.copied .label,
  .code-block-header .copy-btn:hover .label,
  .code-block-header:hover .copy-btn .label,
  .code-block-divider .copy-btn.copied .label,
  .code-block-divider .copy-btn:hover .label,
  .code-block-divider:hover .copy-btn .label {
    max-width: 80px; opacity: 1; margin-left: 2px;
  }
  /* Always show label for the "Output" toggle since it's a primary action */
  .code-block-header .copy-btn.output-toggle .label {
    max-width: 80px; opacity: 1; margin-left: 2px;
  }
  .code-block textarea, .code-block pre {
    width: 100%; padding: 12px 14px; border: none; outline: none;
    font-family: var(--font-mono); font-size: 13px; line-height: 1.55;
    background: transparent; color: var(--text); margin: 0;
    min-height: 60px;
    overflow-y: auto; overflow-x: auto;
    white-space: pre;
    resize: none;
  }
  .code-block textarea { white-space: pre; word-break: normal; }
  .code-block pre { white-space: pre; word-break: normal; max-height: 480px; overflow: auto; }
  .code-block pre code { background: transparent !important; padding: 0 !important; white-space: pre; }
  /* Tighter scrollbars inside code blocks */
  .code-block textarea::-webkit-scrollbar,
  .code-block pre::-webkit-scrollbar { width: 8px; height: 8px; }
  .code-block textarea::-webkit-scrollbar-thumb,
  .code-block pre::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: 6px; border: 2px solid transparent; background-clip: content-box;
  }
  .code-block textarea::-webkit-scrollbar-thumb:hover,
  .code-block pre::-webkit-scrollbar-thumb:hover { background-color: var(--text-subtle); background-clip: content-box; }
  .code-block .code-output {
    background: transparent;
    color: var(--text-muted);
    padding-top: 10px;
  }
  .code-block-divider {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px 4px;
    font-size: 10px; font-weight: 600;
    color: var(--text-subtle); letter-spacing: 0.08em; text-transform: uppercase;
    border-top: 1px solid var(--border);
    background: transparent;
  }
  .code-block-divider .copy-btn { text-transform: none; letter-spacing: 0; font-weight: 500; font-family: var(--font-ui); color: var(--text-subtle); }
  .code-block-divider .copy-btn:hover { color: var(--text); }
  .copy-btn.output-toggle.on { color: var(--accent); background: var(--accent-soft); }
  .copy-btn.output-toggle:not(.on):hover { color: var(--accent); }

  /* ── Visual diagram editor ────────────────────────────────────────────── */
  .mermaid-block {
    position: relative;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
    --mermaid-h: 360px;
    height: var(--mermaid-h);
    display: flex;
    flex-direction: column;
  }
  .mermaid-block.resizing { user-select: none; }
  .mermaid-block.legacy { height: auto; }
  .mermaid-legacy-body {
    padding: 20px;
    overflow: auto;
    background: var(--surface);
  }
  .diagram-editor {
    position: relative;
    display: flex; flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  .diagram-editor.fullscreen {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    min-height: 0; min-width: 0;
  }
  .diagram-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    background: color-mix(in oklab, var(--code-bg) 80%, var(--border));
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .diagram-toolbar-spacer { flex: 1; }
  .diagram-toolbar-divider {
    width: 1px; height: 22px;
    background: var(--border);
    margin: 0 2px;
  }
  .diagram-tb-shapes, .diagram-tb-colors {
    display: inline-flex; gap: 3px;
    padding: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
  }
  .diagram-shape-swatch.sm { width: 24px; height: 22px; }
  .diagram-shape-swatch.sm .diagram-shape-mini { width: 14px; height: 9px; }
  .diagram-shape-swatch.sm .diagram-shape-mini.shape-circle { width: 9px; height: 9px; }
  .diagram-color-swatch.sm { width: 18px; height: 18px; border-radius: 4px; border-width: 2px; }
  .diagram-font-size {
    display: inline-flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px;
    height: 28px;
  }
  .diagram-font-size-value {
    font-size: 11.5px; color: var(--text);
    font-variant-numeric: tabular-nums;
    padding: 0 5px;
    min-width: 26px;
    text-align: center;
  }
  .diagram-font-size .mermaid-icon-btn {
    width: 22px; height: 22px;
  }

  /* Floating selection-aware format bar (appears when a node is selected) */
  .diagram-format-bar {
    position: absolute;
    left: 50%;
    top: 10px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    z-index: 6;
    flex-wrap: nowrap;
    max-width: calc(100% - 20px);
    justify-content: center;
    animation: format-bar-in 160ms ease-out;
  }
  @keyframes format-bar-in {
    from { opacity: 0; transform: translate(-50%, -4px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  .diagram-format-bar .fb-group {
    display: inline-flex; align-items: center; gap: 2px;
  }
  .diagram-format-bar .fb-sep {
    width: 1px; height: 18px; background: var(--border); margin: 0 2px;
    flex-shrink: 0;
  }
  /* Smaller swatches inside the floating bar */
  .diagram-format-bar .diagram-shape-swatch {
    width: 22px; height: 20px;
    border-radius: 4px;
  }
  .diagram-format-bar .diagram-shape-swatch .diagram-shape-mini {
    width: 12px; height: 8px;
  }
  .diagram-format-bar .diagram-shape-swatch .diagram-shape-mini.shape-circle {
    width: 8px; height: 8px;
  }
  .diagram-format-bar .diagram-color-swatch {
    width: 18px; height: 18px; border-radius: 4px; border-width: 2px;
  }
  .diagram-format-bar .diagram-color-swatch:hover { transform: scale(1.12); }
  .diagram-format-bar .diagram-font-size {
    height: 22px; padding: 0;
  }
  .diagram-format-bar .diagram-font-size-value {
    font-size: 11px; padding: 0 3px; min-width: 20px;
  }
  .diagram-format-bar .mermaid-icon-btn {
    width: 22px; height: 22px;
  }
  .diagram-format-bar .diagram-font-size .mermaid-icon-btn {
    width: 20px; height: 20px;
  }
  @media (max-width: 640px) {
    .diagram-format-bar {
      flex-wrap: wrap;
      gap: 4px; padding: 4px 5px;
    }
    .diagram-format-bar .fb-sep { display: none; }
  }
  .mermaid-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 4px;
    background: var(--info-soft); color: var(--info);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .mermaid-icon-btn {
    width: 28px; height: 28px; border-radius: 5px;
    border: none; background: transparent; color: var(--text-subtle); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 120ms;
  }
  .mermaid-icon-btn:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
  .mermaid-icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Canvas */
  .diagram-editor.locked .diagram-canvas { cursor: default; }
  .diagram-editor.locked .diagram-node { cursor: default; }
  .diagram-editor.locked .diagram-anchor { display: none !important; }
  .diagram-editor.locked .diagram-node:hover { transform: none; }
  .mermaid-icon-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .diagram-canvas {
    position: relative;
    flex: 1;
    overflow: hidden;
    background:
      radial-gradient(circle, color-mix(in oklab, var(--border) 75%, transparent) 1px, transparent 1px) 0 0 / 22px 22px,
      var(--bg);
    cursor: grab;
    user-select: none;
  }
  .diagram-world {
    position: absolute; top: 0; left: 0;
    width: 0; height: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .diagram-svg-layer {
    position: absolute; top: 0; left: 0;
    width: 1px; height: 1px;
    overflow: visible;
    pointer-events: none;
  }
  .diagram-svg-layer > g, .diagram-svg-layer > path { pointer-events: auto; }

  /* Edges */
  .diagram-edge-path {
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.5;
    stroke-linecap: round;
    transition: stroke 120ms, stroke-width 120ms;
  }
  .diagram-edge-hit {
    fill: none;
    stroke: transparent;
    stroke-width: 14;
    cursor: pointer;
  }
  .diagram-edge.selected .diagram-edge-path {
    stroke: var(--accent);
    stroke-width: 2;
  }
  .diagram-edge:hover .diagram-edge-path {
    stroke: var(--text);
    stroke-width: 2;
  }
  .diagram-edge-label-bg {
    fill: var(--surface);
    stroke: var(--border-strong);
    stroke-width: 1;
  }
  .diagram-edge-label {
    fill: var(--text);
    font: 600 11px var(--font-ui);
    pointer-events: none;
    user-select: none;
  }
  .diagram-edge.selected .diagram-edge-label-bg { stroke: var(--accent); }
  .diagram-edge-preview {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    stroke-linecap: round;
    pointer-events: none;
  }

  /* Nodes */
  .diagram-node-positioner {
    pointer-events: none;
  }
  .diagram-node-positioner > * { pointer-events: auto; }
  .diagram-node-positioner.edge-target .diagram-node {
    box-shadow: 0 0 0 3px var(--accent), 0 0 18px color-mix(in oklab, var(--accent) 40%, transparent);
  }
  .diagram-node-positioner.edge-source .diagram-node {
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .diagram-node {
    position: absolute;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 120ms;
  }
  .diagram-node:active { cursor: grabbing; }
  .diagram-node.selected { z-index: 2; }
  .diagram-node-shape {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    color: var(--text);
    font-size: inherit; font-weight: 500;
    padding: 6px 12px;
    text-align: center;
    line-height: 1.25;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .diagram-node.shape-round   .diagram-node-shape { border-radius: 10px; }
  .diagram-node.shape-rect    .diagram-node-shape { border-radius: 3px; }
  .diagram-node.shape-pill    .diagram-node-shape { border-radius: 999px; }
  .diagram-node.shape-circle  .diagram-node-shape { border-radius: 50%; }
  .diagram-node.shape-diamond .diagram-node-shape {
    border-radius: 4px;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    border: none;
    background: var(--surface);
    box-shadow:
      inset 0 0 0 1.5px var(--border-strong),
      var(--shadow-sm);
    padding: 6px 28px;
  }
  /* Color variants — change border + soft bg */
  .diagram-node.color-accent  .diagram-node-shape { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-text); }
  .diagram-node.color-info    .diagram-node-shape { border-color: var(--info);   background: var(--info-soft);   color: var(--info); }
  .diagram-node.color-success .diagram-node-shape { border-color: var(--success); background: var(--success-soft); color: var(--success); }
  .diagram-node.color-warning .diagram-node-shape { border-color: var(--warning); background: var(--warning-soft); color: var(--warning); }
  .diagram-node.color-danger  .diagram-node-shape { border-color: var(--danger);  background: var(--danger-soft);  color: var(--danger); }
  /* For diamond, the border isn't drawn (clip-path strips it); use inset shadow instead */
  .diagram-node.shape-diamond.color-accent  .diagram-node-shape { box-shadow: inset 0 0 0 1.5px var(--accent), var(--shadow-sm); }
  .diagram-node.shape-diamond.color-info    .diagram-node-shape { box-shadow: inset 0 0 0 1.5px var(--info), var(--shadow-sm); }
  .diagram-node.shape-diamond.color-success .diagram-node-shape { box-shadow: inset 0 0 0 1.5px var(--success), var(--shadow-sm); }
  .diagram-node.shape-diamond.color-warning .diagram-node-shape { box-shadow: inset 0 0 0 1.5px var(--warning), var(--shadow-sm); }
  .diagram-node.shape-diamond.color-danger  .diagram-node-shape { box-shadow: inset 0 0 0 1.5px var(--danger),  var(--shadow-sm); }
  .diagram-node.selected .diagram-node-shape {
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 45%, transparent), var(--shadow-md);
  }
  .diagram-node-label {
    display: -webkit-box;
    -webkit-line-clamp: 2; line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .diagram-node-input {
    width: 100%;
    border: none; outline: none; background: transparent;
    color: inherit; font: inherit; text-align: center;
    padding: 0;
  }

  /* Anchor connection points */
  .diagram-anchor {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--accent);
    padding: 0; margin: 0;
    cursor: crosshair;
    opacity: 0;
    transition: opacity 120ms, transform 120ms;
    z-index: 3;
  }
  .diagram-anchor:hover { transform: scale(1.3); background: var(--accent); }
  .diagram-node:hover .diagram-anchor,
  .diagram-node.selected .diagram-anchor { opacity: 1; }
  .diagram-anchor.anchor-n { top: -7px;  left: 50%; transform: translateX(-50%); }
  .diagram-anchor.anchor-e { right: -7px; top: 50%; transform: translateY(-50%); }
  .diagram-anchor.anchor-s { bottom: -7px; left: 50%; transform: translateX(-50%); }
  .diagram-anchor.anchor-w { left: -7px;  top: 50%; transform: translateY(-50%); }
  .diagram-node:hover .diagram-anchor.anchor-n:hover { transform: translateX(-50%) scale(1.3); background: var(--accent); }
  .diagram-node:hover .diagram-anchor.anchor-s:hover { transform: translateX(-50%) scale(1.3); background: var(--accent); }
  .diagram-node:hover .diagram-anchor.anchor-e:hover { transform: translateY(-50%) scale(1.3); background: var(--accent); }
  .diagram-node:hover .diagram-anchor.anchor-w:hover { transform: translateY(-50%) scale(1.3); background: var(--accent); }

  /* Empty state */
  .diagram-empty {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-subtle); text-align: center;
    pointer-events: none;
    padding: 20px;
  }
  .diagram-empty svg { opacity: 0.4; }
  .diagram-empty h4 {
    margin: 8px 0 4px;
    color: var(--text-muted); font-weight: 600;
  }
  .diagram-empty-hint { font-size: 12px; line-height: 1.6; }
  .diagram-empty-hint b { color: var(--text); font-weight: 600; }
  .diagram-empty-or { font-size: 11px; color: var(--text-subtle); margin-top: 6px; }

  /* Zoom indicator */
  .diagram-zoom-indicator {
    position: absolute; bottom: 10px; right: 10px;
    padding: 3px 8px; border-radius: 4px;
    background: color-mix(in oklab, var(--surface) 88%, transparent);
    border: 1px solid var(--border);
    backdrop-filter: blur(4px);
    color: var(--text-muted);
    font-size: 11px; font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  /* Resize handle */
  .mermaid-resize-handle {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 6px;
    cursor: ns-resize;
    display: flex; align-items: center; justify-content: center; gap: 3px;
    background: transparent;
    transition: background 120ms;
    z-index: 4;
  }
  .mermaid-resize-handle span {
    display: block;
    width: 20px; height: 2px; border-radius: 1px;
    background: var(--border-strong);
    opacity: 0.5; transition: opacity 120ms, background 120ms;
  }
  .mermaid-resize-handle:hover { background: color-mix(in oklab, var(--accent) 10%, transparent); }
  .mermaid-resize-handle:hover span { opacity: 1; background: var(--accent); }

  /* Fullscreen */
  .mermaid-fullscreen-backdrop {
    position: fixed; inset: 0;
    background: rgba(20, 18, 14, 0.55);
    z-index: 150;
    display: flex; padding: 20px;
    animation: fade-in 160ms;
  }
  :root[data-theme="dark"] .mermaid-fullscreen-backdrop { background: rgba(0, 0, 0, 0.7); }

  /* Context menu (right-click) */
  .diagram-ctx-menu {
    position: fixed;
    z-index: 200;
    min-width: 230px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 4px;
    display: flex; flex-direction: column;
    animation: ctx-menu-in 120ms ease-out;
  }
  @keyframes ctx-menu-in {
    from { opacity: 0; transform: translateY(-4px); }
  }
  .diagram-ctx-item {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 10px; border-radius: 5px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text); font-size: 13px;
    font-family: var(--font-ui);
    text-align: left; width: 100%;
  }
  .diagram-ctx-item:hover:not(:disabled) { background: var(--surface-hover); }
  .diagram-ctx-item:disabled { opacity: 0.4; cursor: not-allowed; }
  .diagram-ctx-item.danger { color: var(--danger); }
  .diagram-ctx-item.danger:hover:not(:disabled) { background: var(--danger-soft); }
  .diagram-ctx-item > span:first-of-type { flex: 1; }
  .diagram-ctx-hint { font-size: 11px; color: var(--text-subtle); margin-left: auto; font-family: var(--font-mono); }
  .diagram-ctx-divider { height: 1px; background: var(--border); margin: 4px 2px; }
  .diagram-ctx-heading {
    padding: 6px 10px 4px;
    font-size: 10px; font-weight: 600;
    color: var(--text-subtle);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .diagram-ctx-shapes, .diagram-ctx-swatches {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 2px 6px 6px;
  }
  .diagram-shape-swatch {
    width: 38px; height: 32px;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 120ms;
  }
  .diagram-shape-swatch:hover { border-color: var(--border-strong); background: var(--surface-hover); }
  .diagram-shape-swatch.active { border-color: var(--accent); background: var(--accent-soft); }
  .diagram-shape-mini {
    display: block;
    width: 22px; height: 14px;
    background: var(--text-muted);
  }
  .diagram-shape-mini.shape-round { border-radius: 4px; }
  .diagram-shape-mini.shape-rect { border-radius: 1px; }
  .diagram-shape-mini.shape-pill { border-radius: 999px; }
  .diagram-shape-mini.shape-circle { border-radius: 50%; width: 14px; height: 14px; }
  .diagram-shape-mini.shape-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
  .diagram-shape-swatch.active .diagram-shape-mini { background: var(--accent); }
  .diagram-color-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    padding: 0;
    transition: all 120ms;
  }
  .diagram-color-swatch:hover { transform: scale(1.08); }
  .diagram-color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }
  .diagram-color-swatch.color-default { background: var(--surface-2); border-color: var(--border-strong); }
  .diagram-color-swatch.color-accent  { background: var(--accent-soft);  border-color: var(--accent); }
  .diagram-color-swatch.color-info    { background: var(--info-soft);    border-color: var(--info); }
  .diagram-color-swatch.color-success { background: var(--success-soft); border-color: var(--success); }
  .diagram-color-swatch.color-warning { background: var(--warning-soft); border-color: var(--warning); }
  .diagram-color-swatch.color-danger  { background: var(--danger-soft);  border-color: var(--danger); }

  /* Mermaid legacy block (kept for backward compat) */
  .mermaid-svg { line-height: 0; }
  .mermaid-svg svg { max-width: 100%; height: auto; display: block; }
  .mermaid-error {
    color: var(--danger); background: var(--danger-soft);
    padding: 10px 12px; border-radius: 6px;
    font-size: 11.5px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .mermaid-error pre {
    margin: 0; font-family: var(--font-mono); font-size: 11px;
    white-space: pre-wrap; word-break: break-word;
    color: var(--danger);
  }
  .mermaid-loading { color: var(--text-subtle); font-size: 12px; }

  /* In-app prompt modal */
  .modal.in-app-prompt input.field-input { margin: 0 0 8px; }
  .modal.in-app-prompt .actions { margin-top: 12px; }

  /* Status segmented */
  .seg {
    display: inline-flex; padding: 3px; background: var(--surface-2);
    border-radius: var(--radius-sm); gap: 2px;
  }
  .seg button {
    border: none; background: transparent; padding: 5px 12px; border-radius: 5px;
    font-size: 12px; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
    font-weight: 500;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
  .seg button.active.success { color: var(--success); }
  .seg button.active.danger { color: var(--danger); }
  .seg button.active.warning { color: var(--warning); }

  /* Tags */
  .tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 6px;
    border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface);
    min-height: 38px; align-items: center; transition: border-color 120ms, box-shadow 120ms;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 4px; font-size: 12px;
    background: var(--accent-soft); color: var(--accent-text); font-weight: 500;
  }
  .tag button { border: none; background: transparent; color: inherit; cursor: pointer; padding: 0; opacity: 0.6; display: flex; }
  .tag button:hover { opacity: 1; }
  .tag-input {
    flex: 1; min-width: 100px; border: none; outline: none; background: transparent;
    padding: 4px; font-size: 13px;
  }

  /* Links list */
  .links-list { display: flex; flex-direction: column; gap: 6px; }
  .link-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface);
  }
  .link-row a {
    flex: 1; color: var(--info); text-decoration: none; font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .link-row a:hover { text-decoration: underline; }
  .link-row .label { font-size: 13px; color: var(--text); }
  .link-row input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; }

  /* Normal-note blocks */
  .blocks { display: flex; flex-direction: column; gap: 12px; }
  .block {
    position: relative;
    transition: transform 200ms cubic-bezier(.2,.8,.2,1), opacity 160ms ease, margin 200ms ease;
  }
  .block.dragging {
    opacity: 0.35;
    transform: scale(0.985);
  }
  /* Drop indicator: blue line above/below */
  .block::before, .block::after {
    content: ""; position: absolute; left: -4px; right: -4px; height: 3px;
    background: var(--accent); border-radius: 2px; opacity: 0;
    pointer-events: none;
    transition: opacity 140ms ease;
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 22%, transparent);
  }
  .block::before { top: -8px; }
  .block::after  { bottom: -8px; }
  .block.drop-before::before { opacity: 1; }
  .block.drop-after::after   { opacity: 1; }

  .block-controls {
    position: absolute; left: -40px; top: 2px;
    display: flex; flex-direction: row; align-items: flex-start; gap: 2px;
    opacity: 0; transition: opacity 140ms ease;
    pointer-events: none;
  }
  .block-controls > * { pointer-events: auto; }
  .block:hover .block-controls,
  .block:focus-within .block-controls,
  .block.dragging .block-controls { opacity: 1; }
  .block-controls .icon-btn { width: 28px; height: 28px; }
  .drag-handle {
    cursor: grab; color: var(--text-subtle);
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    width: 28px; height: 28px;
  }
  .drag-handle svg { width: 18px; height: 18px; }
  .drag-handle:active { cursor: grabbing; background: var(--surface-hover); }
  .drag-handle:hover { color: var(--text); background: var(--surface-hover); }

  /* Per-block alignment — handle center matches first-line center */
  .block:has(> .text-block.heading) .block-controls { top: 4px; }
  .block:has(> .text-block.subheading) .block-controls { top: 2px; }
  .block:has(> .code-block) .block-controls { top: 2px; }
  .block:has(> .mermaid-block) .block-controls { top: 2px; }
  .block:has(> .status-block) .block-controls { top: 12px; }
  .block:has(> .links-block) .block-controls { top: 14px; }
  .block:has(> .noteref-block) .block-controls { top: 14px; }
  .block:has(> .noteref-edit) .block-controls { top: 10px; }
  .block:has(> .table-block) .block-controls { top: 0; }
  .block:has(> .image-block) .block-controls { top: 14px; }
  .block:has(> .file-block) .block-controls { top: 22px; }
  .block:has(> .file-block-empty-wrap) .block-controls { top: 12px; }

  /* Trash button — mirrors the handle position on the right */
  .block-remove {
    position: absolute; right: -38px; top: 2px;
    width: 28px; height: 28px;
    opacity: 0; transition: opacity 140ms ease;
    color: var(--text-subtle);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .block-remove svg { width: 16px; height: 16px; }
  .block:hover .block-remove,
  .block:focus-within .block-remove { opacity: 1; }
  .block-remove:hover { color: var(--danger); background: var(--danger-soft); }
  .block:has(> .text-block.heading) .block-remove { top: 4px; }
  .block:has(> .text-block.subheading) .block-remove { top: 2px; }
  .block:has(> .code-block) .block-remove { top: 2px; }
  .block:has(> .mermaid-block) .block-remove { top: 2px; }
  .block:has(> .status-block) .block-remove { top: 12px; }
  .block:has(> .links-block) .block-remove { top: 14px; }
  .block:has(> .noteref-block) .block-remove { top: 14px; }
  .block:has(> .noteref-edit) .block-remove { top: 10px; }
  .block:has(> .table-block) .block-remove { top: 0; }
  .block:has(> .image-block) .block-remove { top: 14px; }
  .block:has(> .file-block) .block-remove { top: 22px; }
  .block:has(> .file-block-empty-wrap) .block-remove { top: 12px; }
  .drag-handle:hover { color: var(--text); background: var(--surface-hover); }
  @media (max-width: 900px) {
    .block-controls {
      position: static; opacity: 1;
      justify-content: flex-end; padding: 0 0 4px;
    }
    .block-remove { position: static; opacity: 1; align-self: flex-end; }
  }
  .add-block-row {
    margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius);
  }
  .add-block-row .label { font-size: 12px; color: var(--text-subtle); margin-right: 4px; }

  /* Text block */
  .text-block {
    width: 100%; border: none; outline: none; background: transparent; color: var(--text);
    font-family: var(--font-ui); font-size: 15px; line-height: 1.6; padding: 4px 0;
    min-height: 28px;
  }
  .text-block.heading { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.3; }
  .text-block.subheading { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; }
  .text-block::placeholder { color: var(--text-subtle); }

  /* Checklist */
  .checklist-row { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; }
  .checklist-row input[type="checkbox"] {
    appearance: none; width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border-strong); background: var(--surface); margin-top: 4px;
    cursor: pointer; display: grid; place-content: center; transition: all 120ms; flex-shrink: 0;
  }
  .checklist-row input[type="checkbox"]:hover { border-color: var(--accent); }
  .checklist-row input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .checklist-row input[type="checkbox"]:checked::after {
    content: ""; width: 10px; height: 6px;
    border-left: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .checklist-row .text-block { flex: 1; padding: 2px 0; }
  .checklist-row.done .text-block { text-decoration: line-through; color: var(--text-subtle); }
  .checklist-row .remove-btn { opacity: 0; transition: opacity 120ms; }
  .checklist-row:hover .remove-btn { opacity: 1; }

  /* Table block */
  .table-block { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-block table { width: 100%; border-collapse: collapse; }
  .table-block th, .table-block td { border: 1px solid var(--border); padding: 0; vertical-align: top; }
  .table-block th { background: var(--surface-2); }
  .table-block input { width: 100%; padding: 8px 10px; border: none; outline: none; background: transparent;
    font-size: 13px; color: var(--text); font-family: var(--font-ui); }
  .table-block th input { font-weight: 600; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .table-block input:focus { background: var(--accent-soft); }
  .table-cell-formula input {
    color: var(--info);
    font-family: var(--font-mono);
    background: color-mix(in oklab, var(--info-soft) 50%, transparent);
  }
  .table-cell-formula input:focus { background: var(--accent-soft); color: var(--text); font-family: var(--font-ui); }
  .table-controls { display: flex; gap: 4px; padding: 6px; background: var(--surface-2); border-top: 1px solid var(--border); }

  /* Image block */
  .image-block {
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    background: var(--surface-2);
  }
  .image-block.empty {
    padding: 28px; text-align: center; color: var(--text-subtle); cursor: pointer;
    border: 1px dashed var(--border-strong);
  }
  .image-block.empty:hover { background: var(--accent-soft); color: var(--accent-text); border-color: var(--accent); }
  .image-block img { display: block; width: 100%; max-height: 480px; object-fit: contain; background: var(--surface-2); }
  .image-block-cap {
    padding: 8px 12px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted); display: flex; gap: 6px; align-items: center;
  }
  .image-block-cap input { flex: 1; border: none; outline: none; background: transparent; font-size: 12px; color: var(--text-muted); }

  /* Empty editor state */
  .editor-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-subtle); padding: 40px; text-align: center; gap: 18px;
  }
  .editor-empty .empty-mark {
    width: 72px; height: 72px; border-radius: 16px;
    background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted);
  }
  .editor-empty h2 { margin: 0; color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
  .editor-empty .actions { display: flex; gap: 8px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: var(--radius);
    font-size: 13px; box-shadow: var(--shadow-lg); z-index: 200; animation: toast-in 240ms;
  }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(20, 18, 14, 0.4); z-index: 100;
    display: grid; place-items: center; padding: 20px; animation: fade-in 160ms;
  }
  :root[data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, 0.6); }
  @keyframes fade-in { from { opacity: 0; } }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    width: 100%; max-width: 420px; padding: 24px; border: 1px solid var(--border);
  }
  .modal h3 { margin: 0 0 14px; font-weight: 600; letter-spacing: -0.01em; }
  .modal .actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }

  /* Version history modal */
  .version-modal {
    max-width: 1000px;
    width: 100%;
    padding: 0;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 60px);
    overflow: hidden;
    position: relative;
  }
  .version-modal-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .version-modal-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }
  .version-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .version-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 6px;
    background: var(--bg);
    display: flex; flex-direction: column; gap: 2px;
  }
  .version-item {
    text-align: left; width: 100%;
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer; color: var(--text);
    position: relative;
    transition: background 120ms, border-color 120ms;
    display: flex; flex-direction: column; gap: 4px;
  }
  .version-item:hover { background: var(--surface); }
  .version-item.active { background: var(--surface); border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
  .version-item-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .version-item-time { font-size: 13px; font-weight: 500; }
  .version-item-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px;
  }
  .version-item-badge.current { background: var(--accent-soft); color: var(--accent-text); }
  .version-item-badge.manual { background: var(--info-soft); color: var(--info); }
  .version-item-badge.restore { background: var(--warning-soft); color: var(--warning); }
  .version-item-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-subtle);
  }
  .version-item-meta .dot-sep { width: 2px; height: 2px; background: currentColor; border-radius: 50%; }
  .version-item-preview {
    font-size: 12px; color: var(--text-muted);
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    line-clamp: 2;
  }
  .version-item-delete {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px;
    border: none; background: transparent;
    color: var(--text-subtle); cursor: pointer;
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 120ms, background 120ms, color 120ms;
  }
  .version-item:hover .version-item-delete,
  .version-item.active .version-item-delete { opacity: 0.6; }
  .version-item-delete:hover { opacity: 1 !important; background: var(--danger-soft); color: var(--danger); }
  .version-detail {
    display: flex; flex-direction: column;
    min-height: 0; min-width: 0;
    background: var(--surface);
  }
  .version-detail-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .version-detail-body {
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
  }
  .version-preview { display: flex; flex-direction: column; gap: 12px; }
  .version-preview-title {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.25;
    color: var(--text);
  }
  .version-preview-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .version-preview-blocks {
    display: flex; flex-direction: column; gap: 10px;
  }
  .version-preview-block { color: var(--text); }
  .version-preview-block .text-block { padding: 0; }
  .version-preview-empty { color: var(--text-subtle); font-size: 13px; font-style: italic; }

  /* GitHub-style line diff for version history */
  .version-view-seg { padding: 2px; background: var(--surface-2); align-self: flex-start; }
  .version-view-seg button { padding: 4px 10px; font-size: 11px; font-weight: 500; gap: 5px; }
  .version-diff {
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }
  .version-diff-summary {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .version-diff-stat {
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 600; font-variant-numeric: tabular-nums;
  }
  .version-diff-stat.add { color: var(--success); }
  .version-diff-stat.del { color: var(--danger); }
  .version-diff-stat-bar {
    display: inline-block; height: 8px;
    border-radius: 2px;
    min-width: 8px;
  }
  .version-diff-stat.add .version-diff-stat-bar { background: var(--success); }
  .version-diff-stat.del .version-diff-stat-bar { background: var(--danger); }
  .version-diff-legend {
    margin-left: auto;
    color: var(--text-muted); font-size: 11px;
  }
  .version-diff-body {
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.55;
    background: var(--surface);
    overflow-x: auto;
  }
  .version-diff-line {
    display: flex; align-items: flex-start;
    padding: 0 12px;
    white-space: pre-wrap; word-break: break-word;
    min-height: 20px;
  }
  .version-diff-sign {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    color: var(--text-subtle);
    user-select: none;
    font-weight: 600;
  }
  .version-diff-text {
    flex: 1;
    min-width: 0;
    color: var(--text);
  }
  .version-diff-line.add {
    background: color-mix(in oklab, var(--success) 12%, transparent);
  }
  .version-diff-line.add .version-diff-sign { color: var(--success); }
  .version-diff-line.add .version-diff-text { color: color-mix(in oklab, var(--success) 80%, var(--text)); }
  .version-diff-line.del {
    background: color-mix(in oklab, var(--danger) 12%, transparent);
  }
  .version-diff-line.del .version-diff-sign { color: var(--danger); }
  .version-diff-line.del .version-diff-text { color: color-mix(in oklab, var(--danger) 80%, var(--text)); }
  .version-diff-line.context {
    color: var(--text-muted);
  }
  .version-diff-line.context .version-diff-text { color: var(--text-muted); }
  .version-diff-skip {
    padding: 4px 12px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    color: var(--text-subtle);
    font-family: var(--font-ui);
    font-size: 11px;
    text-align: center;
    user-select: none;
  }
  .version-diff-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 40px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .version-diff-empty svg { color: var(--success); }
  .version-diff-empty-sub {
    font-size: 12px; color: var(--text-subtle);
  }
  .version-diff-loading {
    padding: 20px; text-align: center; color: var(--text-subtle); font-size: 13px;
  }

  /* Block-level diff — shows the note in its real form, with each changed block highlighted */
  .version-blocks-diff { display: flex; flex-direction: column; }
  .version-blocks-diff-body { padding: 4px 0 0; }
  .version-blocks-diff-title {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .version-blocks-diff-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .tag.tag-added { background: color-mix(in oklab, var(--success) 18%, transparent); color: var(--success); }
  .tag.tag-removed { background: color-mix(in oklab, var(--danger) 18%, transparent); color: var(--danger); text-decoration: line-through; }
  .version-blocks-diff-list {
    display: flex; flex-direction: column; gap: 2px;
  }
  /* Old bordered-box style replaced below — see "Block-level diff — minimalist" */
  .version-blocks-diff-block-inner { min-width: 0; }
  .version-blocks-diff-block-inner > * { margin: 0; }
  .version-blocks-diff-block-inner .text-block { padding: 0; }
  /* Version list — filter chips */
  .version-filter-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 8px 6px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
    position: sticky; top: 0; z-index: 2;
    background: var(--bg);
  }
  .version-filter-bar .chip { padding: 2px 8px; font-size: 11px; }
  .version-filter-search {
    flex: 1; min-width: 110px;
    padding: 4px 8px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--surface); color: var(--text); outline: none;
  }
  .version-filter-search:focus { border-color: var(--accent); }

  /* Day group header */
  .version-day-header {
    padding: 10px 12px 4px;
    font-size: 10px; font-weight: 700;
    color: var(--text-subtle);
    text-transform: uppercase; letter-spacing: 0.08em;
    position: sticky; top: 38px; z-index: 1;
    background: var(--bg);
    display: flex; align-items: center; gap: 8px;
  }
  .version-day-header::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }

  /* Inline +N/−N stats badge on each version item */
  .version-item-stats {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-left: auto;
  }
  .version-item-stats .add { color: var(--success); }
  .version-item-stats .del { color: var(--danger); }
  .version-item-stats .none { color: var(--text-subtle); font-weight: 500; }

  /* Pin button on version item */
  .version-item-pin {
    position: absolute; top: 6px; right: 32px;
    width: 22px; height: 22px;
    border: none; background: transparent;
    color: var(--text-subtle); cursor: pointer;
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 120ms, color 120ms;
  }
  .version-item.pinned .version-item-pin,
  .version-item:hover .version-item-pin,
  .version-item.active .version-item-pin { opacity: 0.7; }
  .version-item-pin:hover { opacity: 1 !important; color: var(--accent); }
  .version-item.pinned .version-item-pin { color: var(--accent); opacity: 1; }
  .version-item.pinned { border-left: 2px solid var(--accent); padding-left: 10px; }
  .version-item-badge.pinned { background: var(--accent-soft); color: var(--accent-text); }
  .version-item-badge.compare-a { background: var(--info-soft); color: var(--info); }
  .version-item-badge.compare-b { background: var(--success-soft); color: var(--success); }
  .version-item.compare-a { border-color: var(--info); box-shadow: 0 0 0 1px var(--info); }
  .version-item.compare-b { border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }

  /* Detail view: stats panel above diff */
  .version-stats-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .version-stat {
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .version-stat-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-subtle); letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .version-stat-value {
    font-size: 15px; font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    display: flex; align-items: baseline; gap: 6px;
  }
  .version-stat-delta {
    font-size: 11px; font-weight: 600;
  }
  .version-stat-delta.add { color: var(--success); }
  .version-stat-delta.del { color: var(--danger); }
  .version-stat-delta.zero { color: var(--text-subtle); }
  .version-stat-sub {
    font-size: 11px; color: var(--text-muted);
  }

  /* Compare-mode banner */
  .version-compare-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--info-soft);
    border: 1px solid color-mix(in oklab, var(--info) 35%, transparent);
    border-radius: var(--radius);
    margin-bottom: 14px;
    font-size: 12px; color: var(--text);
  }
  .version-compare-bar .label-a, .version-compare-bar .label-b {
    font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
  }
  .version-compare-bar .label-a { background: var(--info-soft); color: var(--info); }
  .version-compare-bar .label-b { background: var(--success-soft); color: var(--success); }
  .version-compare-bar .swap-btn {
    margin-left: auto;
    background: var(--surface); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 5px;
    font-size: 11px; cursor: pointer; color: var(--text);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .version-compare-bar .swap-btn:hover { background: var(--surface-hover); }

  /* Modified block — both old and new shown stacked with word-level diff */
  .version-blocks-diff-block.mod {
    background: color-mix(in oklab, var(--warning) 8%, transparent);
    border-color: color-mix(in oklab, var(--warning) 35%, transparent);
    padding-left: 28px;
  }
  .version-blocks-diff-block.mod .version-diff-marker {
    color: var(--warning);
    background: color-mix(in oklab, var(--warning) 18%, transparent);
  }
  /* Block-kind label on each diff block (top-right) */
  .version-block-kind {
    position: absolute;
    right: 8px; top: 4px;
    font-size: 9.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-subtle);
    padding: 1px 6px; border-radius: 3px;
    background: var(--surface-2);
    pointer-events: none;
    user-select: none;
    opacity: 0.7;
  }
  .version-blocks-diff-block:hover .version-block-kind { opacity: 1; }
